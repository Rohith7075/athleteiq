# ── AthleteIQ GitLab CI Pipeline ─────────────

image: node:20

stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - security

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - athleteiq/node_modules/
    - .npm/

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

before_script:
  - cd athleteiq
  - npm ci

# ── ESLint ────────────────────────────────────
lint:
  stage: lint
  script:
    - npm run lint:ci
  only:
    - main
    - merge_requests

# ── Prettier Format Check ────────────────────
format:
  stage: format
  script:
    - npm run format
  allow_failure: true
  only:
    - main
    - merge_requests

# ── TypeScript Type Check ────────────────────
type_check:
  stage: type_check
  script:
    - npm run type-check
  only:
    - main
    - merge_requests

# ── Build ─────────────────────────────────────
build:
  stage: test
  script:
    - npm run build
  artifacts:
    paths:
      - athleteiq/.next/
    expire_in: 1 week
  only:
    - main
    - merge_requests

# ── Unit Tests (placeholder) ─────────────────
test:
  stage: test
  script:
    - npm run test
  allow_failure: true
  only:
    - main
    - merge_requests

# ── Code Coverage ────────────────────────────
coverage:
  stage: coverage
  script:
    - npm run test:coverage
  allow_failure: true
  only:
    - main
    - merge_requests

# ── Secret Scanning (Gitleaks) ────────────────
secret-scanning:
  stage: security
  script:
    - npx gitleaks detect --source . --no-git -v
  allow_failure: true
  only:
    - main
    - merge_requests

# ── Security Audit ───────────────────────────
security-audit:
  stage: security
  script:
    - npm audit --audit-level=moderate
  allow_failure: true
  only:
    - main
    - merge_requests