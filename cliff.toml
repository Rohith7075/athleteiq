# ── AthleteIQ Changelog Configuration (git-cliff) ──
[changelog]
header = "# Changelog\n\nAll notable changes to AthleteIQ are documented in this file.\n"
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}
{%- endfor %}
{% endfor %}
"""
footer = """
---
*This changelog was auto-generated by [git-cliff](https://github.com/orhun/git-cliff).*
"""
trim = true
postprocess = []

[git]
conventional_commits = true
filter_unconventional = false
split_commits = true
commit_preprocessors = [
  { pattern = "\\(([^)]*)\\)", replace = "" },
  { pattern = "feat\\((.*)\\)", replace = "feat($1)" },
]