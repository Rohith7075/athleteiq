# ── AthleteIQ GitLab CI Pipeline ─────────────

image: node:20

stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - security

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - athleteiq/node_modules/
    - .npm/

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

before_script:
  - cd athleteiq
  - npm ci

# ── Lint ──────────────────────────────────────
lint:
  stage: lint
  script:
    - npm run lint
  only:
    - main
    - merge_requests

# ── Format Check (Prettier) ───────────────────
format:
  stage: format
  script:
    - npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css,md}" || echo "Run: npx prettier --write src/ to fix"
  allow_failure: true
  only:
    - main
    - merge_requests

# ── TypeScript Type Check ─────────────────────
type_check:
  stage: type_check
  script:
    - npx tsc --noEmit
  only:
    - main
    - merge_requests

# ── Build ─────────────────────────────────────
build:
  stage: test
  script:
    - npm run build
  artifacts:
    paths:
      - athleteiq/.next/
    expire_in: 1 week
  only:
    - main
    - merge_requests

# ── Coverage Report ──────────────────────────
coverage:
  stage: coverage
  script:
    - echo "No test framework configured yet. Skipping coverage."
    - echo "To enable: add a test framework (e.g., Vitest) and run npx vitest --coverage"
  allow_failure: true
  only:
    - main
    - merge_requests

# ── Security Audit ────────────────────────────
security-audit:
  stage: security
  script:
    - npm audit --audit-level=moderate
  allow_failure: true
  only:
    - main
    - merge_requests

# ── Dependency Audit ──────────────────────────
dependency-audit:
  stage: test
  script:
    - npx audit-ci --moderate
  allow_failure: true
  only:
    - main